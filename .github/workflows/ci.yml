name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv
      - name: Sync workspace
        run: uv sync
      - name: Run tests
        run: uv run pytest
      - name: Check interactive CLI
        run: uv run interactive --help
      - name: Check simulation CLI
        run: uv run simulation --help

  trigger-runner:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch agario-runner rebuild
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.RUNNER_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository_owner }}/agario-runner/dispatches \
            -d '{"event_type":"agario-public-updated","client_payload":{"sha":"${{ github.sha }}"}}'
