name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv
      - name: Sync workspace
        run: uv sync
      - name: Run tests
        run: uv run pytest
      - name: Check visualiser CLI
        run: uv run agario-local-match --help
